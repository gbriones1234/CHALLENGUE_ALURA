<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Agente Documentos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Dark mode -->
  <style>
    body { background-color: #121212; color: #e0e0e0; }
    .chat-container { max-width: 800px; margin: 20px auto; }
    #chatWindow { height: 400px; overflow-y: auto; border: 1px solid #444; padding: 10px; background: #1e1e1e; }
    .message { margin: 5px 0; }
    .user-msg .bubble { background: #0d6efd; color: #fff; padding: 8px 12px; border-radius: 15px; display: inline-block; }
    .bot-msg .bubble { background: #333; color: #e0e0e0; padding: 8px 12px; border-radius: 15px; display: inline-block; }
    #dropzone { border: 2px dashed #666; padding: 20px; text-align: center; margin-bottom: 10px; cursor: pointer; }
    #dropzone.dragover { background-color: #222; }
    .progress { height: 25px; margin-bottom: 10px; }
    .progress-bar { width: 0%; }
  </style>
</head>
<body>
  <div class="container chat-container">
    <h1 class="text-center mb-4">Agente Documentos</h1>

    <!-- Documentos cargados -->
    <div id="docList" class="mb-3"></div>

    <!-- Dropzone y subida -->
    <div id="dropzone">Arrastra tu archivo aquí o usa el botón</div>
    <div class="progress">
      <div id="progress" class="progress-bar bg-success"></div>
    </div>
    <div class="mb-3">
      <input type="file" id="fileInput" class="form-control mb-2">
      <button id="uploadBtn" class="btn btn-primary">Subir</button>
    </div>

    <!-- Chat -->
    <div id="chatWindow" class="mb-3"></div>
    <div class="input-group">
      <input id="userInput" type="text" class="form-control" placeholder="Escribe tu mensaje...">
      <button id="sendBtn" class="btn btn-success">Enviar</button>
    </div>
  </div>

  <!-- Bootstrap JS + Marked (Markdown parser) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Tu lógica de frontend -->
  <script src="app.js"></script>
</body>
</html>
