<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Agente de Documentos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="container py-5">

  <h1 class="mb-4">Gestión de Documentos</h1>

  <div id="dropzone" class="border border-primary rounded p-5 text-center mb-3 bg-light">
    Arrastra tu PDF aquí
  </div>

  <div class="input-group mb-3">
    <input type="file" class="form-control" id="fileInput">
    <button class="btn btn-primary" id="uploadBtn">Upload</button>
  </div>

  <div class="progress mb-3" style="height: 25px;">
    <div id="progress" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%">0%</div>
  </div>

  <div id="documents" class="mt-4"></div>

  <script src="app.js"></script>
</body>
</html>
