<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mercado Central 24H • Asistente Inteligente</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --surface2:  #1e2530;
    --border:    #30363d;
    --accent:    #2f81f7;
    --accent-dim:#1a4f9c;
    --green:     #3fb950;
    --text:      #e6edf3;
    --muted:     #7d8590;
    --danger:    #f85149;
    --radius:    10px;
  }

  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; }

  /* ── LAYOUT ── */
  .layout { display: flex; height: 100vh; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 280px; min-width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 20px 16px;
    gap: 16px;
    overflow-y: auto;
  }

  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon { font-size: 24px; }
  .brand-text h5 { font-size: 14px; font-weight: 600; color: var(--text); margin: 0; }
  .brand-text small { color: var(--muted); font-size: 11px; }

  .divider { border: none; border-top: 1px solid var(--border); }

  .section-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }

  /* ── DOCS ── */
  #docList { display: flex; flex-wrap: wrap; gap: 6px; min-height: 32px; }
  .doc-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-size: 11px; padding: 3px 9px;
    border-radius: 20px; max-width: 230px;
  }
  .doc-badge span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .doc-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .no-docs { color: var(--muted); font-size: 12px; font-style: italic; }

  /* ── DROPZONE ── */
  .dropzone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
    user-select: none;
  }
  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent);
    background: rgba(47,129,247,.07);
    color: var(--text);
  }
  .dropzone .dz-icon { font-size: 28px; display: block; margin-bottom: 8px; }
  .dropzone .dz-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

  #fileInput { display: none; }

  /* ── FILE SELECTED ── */
  #fileSelected {
    display: none;
    align-items: center; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px; font-size: 12px;
  }
  #fileSelected .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
  #fileSelected .file-clear { cursor: pointer; color: var(--muted); font-size: 14px; line-height: 1; }
  #fileSelected .file-clear:hover { color: var(--danger); }

  /* ── UPLOAD BTN ── */
  #uploadBtn {
    background: var(--accent); border: none; color: #fff;
    border-radius: 8px; padding: 9px 14px; font-size: 13px;
    font-weight: 500; width: 100%; cursor: pointer;
    transition: background .2s, opacity .2s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  #uploadBtn:hover:not(:disabled) { background: #388bfd; }
  #uploadBtn:disabled { opacity: .5; cursor: not-allowed; }

  /* ── PROGRESS ── */
  .progress-wrap { display: none; }
  .progress-wrap .bar-track {
    height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden;
  }
  .progress-wrap .bar-fill {
    height: 100%; background: var(--accent); width: 0%;
    transition: width .2s; border-radius: 99px;
  }
  .progress-wrap .bar-label { font-size: 11px; color: var(--muted); margin-top: 4px; text-align: right; }

  /* ── CHAT PANEL ── */
  .chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ── CHAT HEADER ── */
  .chat-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    background: var(--surface);
  }
  .chat-header .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .chat-header .header-label { font-size: 13px; font-weight: 600; }
  .chat-header .header-sub { font-size: 11px; color: var(--muted); margin-left: auto; }

  /* ── CHAT BOX ── */
  .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .chat-box::-webkit-scrollbar { width: 4px; }
  .chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* ── MESSAGES ── */
  .msg { display: flex; gap: 10px; max-width: 78%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot  { align-self: flex-start; }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0; margin-top: 2px;
  }
  .msg.user .avatar { background: var(--accent-dim); }
  .msg.bot  .avatar { background: var(--surface2); border: 1px solid var(--border); }

  .bubble {
    padding: 10px 14px; border-radius: var(--radius);
    line-height: 1.55; font-size: 13.5px;
  }
  .msg.user .bubble { background: var(--accent); color: #fff; border-top-right-radius: 3px; }
  .msg.bot  .bubble { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-top-left-radius: 3px; }
  .bubble p { margin: 0 0 6px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble code { font-family: 'JetBrains Mono', monospace; font-size: 12px; background: rgba(0,0,0,.3); padding: 1px 5px; border-radius: 4px; }

  /* ── GRÁFICA DE INVENTARIO ── */
  .chart-img {
    display: block;
    max-width: 100%;
    margin-top: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
  }

  /* ── CHIPS DE SUGERENCIAS ── */
  .suggestions {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-left: 42px; /* alinea con la burbuja del bot (avatar 32px + gap 10px) */
    max-width: 78%;
  }
  .suggestion-chip {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-size: 12px; padding: 6px 12px;
    border-radius: 20px; cursor: pointer;
    transition: border-color .15s, color .15s, background .15s;
  }
  .suggestion-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(47,129,247,.08);
  }

  /* ── THINKING ── */
  .thinking-bubble {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); border-top-left-radius: 3px;
    padding: 12px 16px; display: flex; flex-direction: column; gap: 8px;
    min-width: 220px;
  }
  .thinking-step {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--muted);
    transition: color .3s;
  }
  .thinking-step.active { color: var(--text); }
  .thinking-step.done   { color: var(--green); }
  .thinking-step .step-icon { font-size: 14px; width: 18px; text-align: center; }
  .thinking-step .spinner {
    width: 12px; height: 12px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .7s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .thinking-step .check { color: var(--green); font-size: 13px; }

  /* ── INPUT BAR ── */
  .input-bar {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex; gap: 10px; align-items: flex-end;
  }
  .input-wrap { flex: 1; position: relative; }
  #userInput {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 14px; color: var(--text);
    font-size: 14px; font-family: 'Inter', sans-serif; resize: none;
    transition: border-color .2s; line-height: 1.5;
    outline: none; max-height: 140px; overflow-y: auto;
  }
  #userInput:focus { border-color: var(--accent); }
  #userInput::placeholder { color: var(--muted); }

  #sendBtn {
    background: var(--accent); border: none; color: #fff;
    width: 42px; height: 42px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background .2s, transform .1s;
    flex-shrink: 0;
  }
  #sendBtn:hover:not(:disabled) { background: #388bfd; }
  #sendBtn:active:not(:disabled) { transform: scale(.93); }
  #sendBtn:disabled { opacity: .4; cursor: not-allowed; }
  #sendBtn svg { width: 18px; height: 18px; fill: #fff; }

  .input-hint { font-size: 11px; color: var(--muted); text-align: right; margin-top: 4px; padding-right: 2px; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px; border-radius: 8px;
    font-size: 13px; opacity: 0; pointer-events: none;
    transition: opacity .25s, transform .25s; z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.ok   { border-color: var(--green); }
  #toast.err  { border-color: var(--danger); }
</style>
</head>
<body>

<div class="layout">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">

    <div class="brand">
      <div class="brand-icon">🏪</div>
      <div class="brand-text">
        <h5>Mercado Central 24H</h5>
        <small>Asistente inteligente de documentos e inventario</small>
      </div>
    </div>

    <hr class="divider">

    <div class="section-label">Documentos indexados</div>
    <div id="docList"><span class="no-docs">Sin documentos aún</span></div>

    <hr class="divider">

    <div class="section-label">Subir documento</div>

    <div class="dropzone" id="dropzone">
      <span class="dz-icon">📄</span>
      Arrastra un PDF aquí
      <div class="dz-hint">o haz clic para seleccionar</div>
    </div>

    <input type="file" id="fileInput" accept=".pdf">

    <div id="fileSelected">
      <span>📎</span>
      <span class="file-name" id="fileName">—</span>
      <span class="file-clear" id="fileClear" title="Quitar">✕</span>
    </div>

    <button id="uploadBtn" disabled>
      <span id="uploadBtnIcon">⬆</span>
      <span id="uploadBtnText">Subir documento</span>
    </button>

    <div class="progress-wrap" id="progressWrap">
      <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
      <div class="bar-label" id="barLabel">0%</div>
    </div>

  </aside>

  <!-- ── CHAT ── -->
  <div class="chat-panel">

    <div class="chat-header">
      <div class="status-dot"></div>
      <span class="header-label">Chat con documentos e inventario</span>
      <span class="header-sub" id="modelLabel">qwen2.5:3b · pgvector + pandas</span>
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="userInput" rows="1" placeholder="Escribe tu pregunta…"></textarea>
        <div class="input-hint">Enter para enviar · Shift+Enter nueva línea</div>
      </div>
      <button id="sendBtn" title="Enviar">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>

  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="app.js"></script>
</body>
</html>
